[custom]
enable_rule_generator=true
overwrite_original_rules=true

; 过滤公告/流量/到期/教程/网址类垃圾节点名
exclude_remarks=(?i)(https?://|官网|首页|公告|通知|订阅|最新网址|最新地址|备用网址|防失联|剩余|到期|过期|重置|流量|套餐|购买|价格|优惠|活动|群组|群聊|群号|QQ群|TG群|Telegram客服|微信|客服|工单|赞助|捐赠|点击进入|点击查看|永久网址|域名|广告|推广|返利|邀请|注册|登录|邮箱|邮件|outlook\.com|gmail\.com)

; =========================
; 代理组（适合 stymei 转 Mihomo 可直接导入/复制）
; 说明：这里生成的是 Mihomo 可用的 YAML
; =========================
custom_proxy_group=🚀 节点选择`select`[]🤖 AI服务`[]🔎 Google服务`[]☁️ Cloudflare`[]🐙 GitHub`[]📦 Docker&Debian`[]📺 YouTube`[]🎬 奈飞`[]♻️ 自动选择`[]🌍 国际稳区`[]🌐 故障转移`[]DIRECT`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`300,,80
custom_proxy_group=🌐 故障转移`fallback`.*`https://cp.cloudflare.com/generate_204`300,5

