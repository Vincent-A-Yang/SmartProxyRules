[custom]
enable_rule_generator=true
overwrite_original_rules=true

; 手机版：保持轻量，只做核心可用性。
; 过滤伪节点 + kb/s 低速节点，保留 AI / FCM / 直连 / 兜底。
exclude_remarks=(?i)(剩余流量|流量[:：]?|套餐到期|到期时间|(?:^|[^a-z0-9])(?:\d+(?:\.\d+)?\s*)?(?:kb/s|kib/s|kbps|kb)(?:[^a-z0-9]|$)|俄罗斯|到期|过期|失效|重置|官网|最新地址|地址公告|更新订阅|订阅更新|教程|测试|邮件|邮箱|outlook\.com|gmail\.com|客服|工单|交流群|官方群|群组|群\b|频道|售后)

custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🌍 国际稳区`[]🤖 AI稳区`[]🎯 全球直连`[]DIRECT`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,5,80
