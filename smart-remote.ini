[custom]
; 单文件远程配置，适用于支持 subconverter / ACL4SSR 外部配置语法的订阅转换后端
; 目标：单文件、自动分流、默认智能路由、过滤垃圾节点名、无额外私有规则文件依赖

enable_rule_generator=true
overwrite_original_rules=true

; 过滤明显不是正常线路名称的节点备注
exclude_remarks=(?i)(剩余流量|流量[:：]?|套餐到期|到期时间|到期|过期|失效|重置|官网|最新地址|官网地址|地址公告|更新订阅|订阅更新|请先更新|使用教程|教程软件|测试|邮件|邮箱|outlook\.com|gmail\.com|保持每天更新|新平台|升级版本|备用网址|防失联|客服|工单|群\b|频道|telegram|tg\b)

; =========================
; 代理组
; =========================

; 总入口：默认走全局自动，可手动切换到兜底或地区组
custom_proxy_group=🚀 智能路由`select`[]♻️ 全局自动`[]🌐 全局兜底`[]🇭🇰 港新台日自动`[]🇺🇸 美加欧自动`[]🎯 国内直连`.*

; 全量自动测速与兜底
custom_proxy_group=♻️ 全局自动`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🌐 全局兜底`fallback`.*`http://www.gstatic.com/generate_204`300,5

; 地区自动组，尽量给智能路由更稳定的候选
custom_proxy_group=🇭🇰 港新台日自动`url-test`(?i)(香港|hk|hong kong|台湾|tw|taiwan|新加坡|sg|singapore|日本|jp|japan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美加欧自动`url-test`(?i)(美国|us|united states|加拿大|ca|canada|英国|uk|德|de|germany|荷兰|nl|netherlands|法国|fr|france|欧洲|eu)`http://www.gstatic.com/generate_204`300,,50

; 业务入口组：规则只命中这些入口组，不直接命中底层自动组
custom_proxy_group=🤖 AI服务`select`[]🤖 AI自动`[]🌐 全局兜底`[]♻️ 全局自动`[]🇭🇰 港新台日自动`[]🇺🇸 美加欧自动`[]🚀 智能路由`.*
custom_proxy_group=🔎 Google服务`select`[]🔎 Google自动`[]🌐 全局兜底`[]♻️ 全局自动`[]🇭🇰 港新台日自动`[]🇺🇸 美加欧自动`[]🚀 智能路由`.*
custom_proxy_group=☁️ Cloudflare服务`select`[]☁️ Cloudflare自动`[]🌐 全局兜底`[]♻️ 全局自动`[]🇭🇰 港新台日自动`[]🇺🇸 美加欧自动`[]🚀 智能路由`.*
custom_proxy_group=🐙 GitHub服务`select`[]🐙 GitHub自动`[]🌐 全局兜底`[]♻️ 全局自动`[]🇭🇰 港新台日自动`[]🇺🇸 美加欧自动`[]🚀 智能路由`.*
custom_proxy_group=📦 开发仓库`select`[]📦 开发自动`[]🌐 全局兜底`[]♻️ 全局自动`[]🇭🇰 港新台日自动`[]🇺🇸 美加欧自动`[]🚀 智能路由`.*
custom_proxy_group=📺 YouTube服务`select`[]📺 YouTube自动`[]🌐 全局兜底`[]♻️ 全局自动`[]🇭🇰 港新台日自动`[]🇺🇸 美加欧自动`[]🚀 智能路由`.*
custom_proxy_group=🎬 流媒体服务`select`[]🎬 流媒体自动`[]🌐 全局兜底`[]♻️ 全局自动`[]🇭🇰 港新台日自动`[]🇺🇸 美加欧自动`[]🚀 智能路由`.*
custom_proxy_group=🎯 国内直连`select`[]DIRECT`[]🚀 智能路由
custom_proxy_group=⛔ 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 智能路由`[]🎯 国内直连`[]🌐 全局兜底`.*

; 业务自动测速组
custom_proxy_group=🤖 AI自动`url-test`(?i)(美国|us|加拿大|ca|新加坡|sg|日本|jp|台湾|tw|香港|hk)`http://www.gstatic.com/generate_204`240,,40
custom_proxy_group=🔎 Google自动`url-test`(?i)(美国|us|新加坡|sg|日本|jp|台湾|tw|香港|hk)`http://www.gstatic.com/generate_204`240,,40
custom_proxy_group=☁️ Cloudflare自动`url-test`(?i)(美国|us|新加坡|sg|日本|jp|台湾|tw|香港|hk|德国|de|荷兰|nl)`https://cp.cloudflare.com/generate_204`240,,40
custom_proxy_group=🐙 GitHub自动`url-test`(?i)(美国|us|新加坡|sg|日本|jp|台湾|tw|香港|hk|加拿大|ca|德国|de|荷兰|nl)`https://github.com/robots.txt`240,,50
custom_proxy_group=📦 开发自动`url-test`(?i)(美国|us|新加坡|sg|日本|jp|台湾|tw|香港|hk|加拿大|ca|德国|de|荷兰|nl)`https://registry-1.docker.io/v2/`240,,50
custom_proxy_group=📺 YouTube自动`url-test`(?i)(美国|us|新加坡|sg|日本|jp|台湾|tw|香港|hk)`http://www.gstatic.com/generate_204`240,,50
custom_proxy_group=🎬 流媒体自动`url-test`(?i)(美国|us|新加坡|sg|日本|jp|台湾|tw|香港|hk)`http://www.gstatic.com/generate_204`240,,50

; =========================
; 规则
; =========================

; 广告
ruleset=⛔ 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=⛔ 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

; 局域网、本地与国内
ruleset=🎯 国内直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 国内直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🎯 国内直连,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.yaml
ruleset=🎯 国内直连,[]GEOIP,CN

; Google / YouTube / GitHub / Netflix
ruleset=🔎 Google服务,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.yaml
ruleset=📺 YouTube服务,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.yaml
