[custom]
; 完整功能版 - ACL4SSR 兼容结构 + Emoji 代理组
; 目标：让转换站正确生成 proxies 与 proxy-groups，并兼容用户现有补丁规则组名

; -----------------------------
; 节点过滤
; -----------------------------
exclude_remarks=(?i)(剩余流量|流量[:：]?|套餐到期|到期|过期|失效|重置|官网|最新官网|官网地址|地址公告|更新订阅|订阅更新|请先更新|使用教程|教程软件|使用教程软件|测试|公告|邮件|邮箱|outlook\.com|gmail\.com|保持每天更新|新平台|升级版本)

