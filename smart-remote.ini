[custom]
enable_rule_generator=true
overwrite_original_rules=true

; =========================
; 节点过滤
; 说明：
; 1) 这里过滤的是“订阅说明/公告/到期/流量/教程/联系方式”一类垃圾节点名
; 2) 目标是尽量屏蔽假节点、公告节点、占位节点，避免进入自动组
; 3) 不对协议名/地区名做激进过滤，避免误伤正常节点
; =========================
exclude_remarks=(?i)(剩余流量|流量[:：]?|套餐到期|到期|过期|失效|重置|官网|最新官网|官网地址|地址公告|更新订阅|订阅更新|请先更新|使用教程|教程软件|使用教程软件|测试|公告|邮件|邮箱|outlook\.com|gmail\.com|保持每天更新|新平台|升级版本)

; =========================
; 自动策略组
; 说明：
; 1) 业务组全部自动，默认 FINAL 走“智能路由”
; 2) url-test 负责优选低延迟，fallback 负责故障转移
; 3) 手动兜底保留全部节点，供必要时手动接管
; =========================
custom_proxy_group=🚀 智能路由`url-test`(?i)(港|hk|hong\s*kong|台|tw|taiwan|新|sg|singapore|日|jp|japan|美|us|united\s*states|加|ca|canada|德|de|germany|荷|nl|netherlands)`https://cp.cloudflare.com/generate_204`180,,50
custom_proxy_group=🛟 自动兜底`fallback`(?i)(港|hk|hong\s*kong|台|tw|taiwan|新|sg|singapore|日|jp|japan|美|us|united\s*states|加|ca|canada|德|de|germany|荷|nl|netherlands)`https://cp.cloudflare.com/generate_204`180
custom_proxy_group=🌐 手动兜底`select`.*
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 智能路由`[]🛟 自动兜底
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT

custom_proxy_group=🤖 AI延迟优选`url-test`(?i)(美|us|日|jp|新|sg|港|hk|台|tw|加|ca)`https://www.gstatic.com/generate_204`180,,30
custom_proxy_group=🤖 AI故障转移`fallback`(?i)(美|us|日|jp|新|sg|港|hk|台|tw|加|ca)`https://www.gstatic.com/generate_204`180

custom_proxy_group=🔎 Google延迟优选`url-test`(?i)(日|jp|新|sg|港|hk|台|tw|美|us)`https://www.gstatic.com/generate_204`180,,30
custom_proxy_group=🔎 Google故障转移`fallback`(?i)(日|jp|新|sg|港|hk|台|tw|美|us)`https://www.gstatic.com/generate_204`180

custom_proxy_group=☁️ Cloudflare延迟优选`url-test`(?i)(港|hk|日|jp|新|sg|美|us|德|de|荷|nl)`https://cp.cloudflare.com/generate_204`180,,30
custom_proxy_group=☁️ Cloudflare故障转移`fallback`(?i)(港|hk|日|jp|新|sg|美|us|德|de|荷|nl)`https://cp.cloudflare.com/generate_204`180

custom_proxy_group=🐙 GitHub延迟优选`url-test`(?i)(港|hk|日|jp|新|sg|美|us|德|de|荷|nl|加|ca)`https://github.com/robots.txt`240,,50
custom_proxy_group=🐙 GitHub故障转移`fallback`(?i)(港|hk|日|jp|新|sg|美|us|德|de|荷|nl|加|ca)`https://github.com/robots.txt`240

custom_proxy_group=📦 开发仓库延迟优选`url-test`(?i)(港|hk|日|jp|新|sg|美|us|德|de|荷|nl|加|ca)`https://registry-1.docker.io/v2/`240,,50
custom_proxy_group=📦 开发仓库故障转移`fallback`(?i)(港|hk|日|jp|新|sg|美|us|德|de|荷|nl|加|ca)`https://registry-1.docker.io/v2/`240

custom_proxy_group=📺 YouTube延迟优选`url-test`(?i)(日|jp|新|sg|港|hk|台|tw|美|us)`https://www.gstatic.com/generate_204`180,,50
custom_proxy_group=📺 YouTube故障转移`fallback`(?i)(日|jp|新|sg|港|hk|台|tw|美|us)`https://www.gstatic.com/generate_204`180

