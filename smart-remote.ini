[custom]
enable_rule_generator=true
overwrite_original_rules=true

; =========================
; 节点名过滤
; 目标：先清洗订阅污染，再进入测速/分组。
; - 过滤套餐、公告、客服、教程、邮箱等伪节点
; - 过滤 kb / kb/s / kbps / kib/s 这类低速测速节点
; - 保留“俄罗斯”作为策略性排除
; =========================
exclude_remarks=(?i)(剩余流量|流量[:：]?|套餐到期|到期时间|(?:^|[^a-z0-9])(?:\d+(?:\.\d+)?\s*)?(?:kb/s|kib/s|kbps|kb)(?:[^a-z0-9]|$)|俄罗斯|到期|过期|失效|重置|官网|最新地址|官网地址|地址公告|更新订阅|订阅更新|请先更新|使用教程|教程软件|测试|邮件|邮箱|outlook\.com|gmail\.com|保持每天更新|新平台|升级版本|备用网址|防失联|客服|工单|交流群|官方群|群组|群\b|频道|telegram客服|售后)

; =========================
; 代理组
; 设计：全局自动 + 可用性兜底 + 按地区/用途建立节点池 + 服务组可手动接管。
; =========================
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🌐 故障转移`[]🌍 国际稳区`[]🤖 AI稳区`[]🇭🇰 港日新台`[]🇺🇸 美加欧`[]DIRECT`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,5,80
custom_proxy_group=🌐 故障转移`fallback`.*`http://www.gstatic.com/generate_204`300,5

custom_proxy_group=🌍 国际稳区`url-test`(?i)(🇺🇸|🇨🇦|🇬🇧|🇩🇪|🇳🇱|🇫🇷|🇸🇬|🇦🇺|美国|美|洛杉矶|圣何塞|西雅图|纽约|加拿大|英国|英|德国|德|荷兰|法国|法|新加坡|狮城|澳大利亚|澳洲|悉尼|墨尔本|\bUS\b|\bUSA\b|\bCA\b|\bUK\b|\bGB\b|\bDE\b|\bNL\b|\bFR\b|\bSG\b|\bAU\b|united\s*states|canada|united\s*kingdom|germany|netherlands|france|singapore|australia)`http://www.gstatic.com/generate_204`300,5,60
