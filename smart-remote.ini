[custom]
enable_rule_generator=true
overwrite_original_rules=true

; 节点名过滤
exclude_remarks=(?i)(剩余流量|流量[:：]?|套餐到期|日本|香港|俄|台|hk|韩国|到期时间|到期|过期|失效|重置|官网|最新地址|官网地址|地址公告|更新订阅|订阅更新|请先更新|使用教程|教程软件|测试|邮件|邮箱|outlook\.com|gmail\.com|保持每天更新|新平台|升级版本|备用网址|防失联|客服|工单|群\b|频道|telegram客服|售后)

